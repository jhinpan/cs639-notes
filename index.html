<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS639 Foundation Models - Study Notes</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
  <nav id="topnav">
    <div class="nav-left">
      <span class="brand">CS639 Foundation Models</span>
      <select id="lecture-select"></select>
    </div>
    <div class="nav-center">
      <button id="btn-prev" title="Previous slide">&larr;</button>
      <span id="slide-counter">1 / 1</span>
      <button id="btn-next" title="Next slide">&rarr;</button>
    </div>
    <div class="nav-right">
      <button id="btn-exam" title="Sample exam questions">Exam</button>
      <button id="btn-qa" title="Ask questions about this slide">Q&A</button>
      <button id="btn-annotations" title="My annotations">Notes</button>
      <button id="btn-toc" title="Table of contents">TOC</button>
      <button id="btn-theme" title="Toggle dark mode">Dark</button>
    </div>
  </nav>

  <main id="split-view">
    <section id="slide-pane">
      <canvas id="slide-canvas"></canvas>
      <div id="slide-loading">Loading slide...</div>
    </section>
    <div id="divider"></div>
    <section id="notes-pane">
      <div id="notes-content">
        <p class="placeholder">Select a lecture to begin.</p>
      </div>
    </section>
    <div id="divider-qa" class="qa-divider hidden"></div>
    <section id="qa-pane" class="hidden">
      <div class="qa-header">
        <span class="qa-title">Q&A</span>
        <button id="qa-clear" title="Clear chat">Clear</button>
        <button id="qa-close" title="Close Q&A">&times;</button>
      </div>
      <div id="qa-messages"></div>
      <form id="qa-form">
        <textarea id="qa-input" placeholder="Ask about this slide..." rows="2"></textarea>
        <button type="submit" id="qa-send">Send</button>
      </form>
    </section>
  </main>

  <section id="exam-view" class="hidden">
    <div id="exam-container">
      <div id="exam-header">
        <div class="exam-progress-wrap">
          <div class="exam-progress-bar"><div id="exam-progress-fill"></div></div>
          <span id="exam-progress-text">0 / 32</span>
        </div>
        <div class="exam-score-wrap">
          <span id="exam-score-display"></span>
          <button id="exam-back" title="Back to lectures">&larr; Back</button>
        </div>
      </div>
      <div id="exam-body">
        <div id="exam-question-area">
          <span id="exam-topic-tag"></span>
          <div id="exam-question-text"></div>
          <div id="exam-options"></div>
          <div id="exam-actions">
            <button id="exam-submit" disabled>Submit</button>
          </div>
          <div id="exam-feedback" class="hidden"></div>
        </div>
        <div id="exam-nav">
          <button id="exam-prev" disabled>&larr; Previous</button>
          <button id="exam-next">Next &rarr;</button>
        </div>
      </div>
      <div id="exam-summary" class="hidden">
        <div class="exam-summary-card">
          <h2>Exam Complete!</h2>
          <div id="exam-summary-score"></div>
          <div id="exam-summary-breakdown"></div>
          <div class="exam-summary-actions">
            <button id="exam-retry">Retry All</button>
            <button id="exam-retry-wrong">Retry Wrong Only</button>
            <button id="exam-back-lectures">Back to Lectures</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="context-menu" class="hidden">
    <button id="ctx-highlight" data-color="yellow">Highlight</button>
    <button id="ctx-highlight-blue" data-color="blue">Blue</button>
    <button id="ctx-highlight-green" data-color="green">Green</button>
    <button id="ctx-note">Add Note</button>
  </div>

  <div id="note-editor" class="hidden">
    <div class="note-editor-header">
      <span class="note-editor-title">Add Note</span>
      <button id="note-editor-close">&times;</button>
    </div>
    <div class="note-editor-quote"></div>
    <textarea id="note-editor-text" placeholder="Write your note here..." rows="4"></textarea>
    <div class="note-editor-actions">
      <button id="note-editor-save">Save</button>
      <button id="note-editor-cancel">Cancel</button>
    </div>
  </div>

  <aside id="toc-panel" class="hidden">
    <div class="toc-header">
      <h3>Lectures</h3>
      <button id="toc-close">&times;</button>
    </div>
    <ul id="toc-list"></ul>
  </aside>

  <aside id="annotations-panel" class="hidden">
    <div class="toc-header">
      <h3>My Annotations</h3>
      <button id="annotations-close">&times;</button>
    </div>
    <div id="annotations-list"></div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.mjs" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
